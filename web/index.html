<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demana la teva cita</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Demana la teva cita</h1>
        <p class="intro">
          Omple el formulari per sol·licitar una cita al taller.
        </p>

        <form id="citaForm">
          <label for="vehicle_id">Vehicle</label>

          <select id="vehicle_id" required>
            <option value="">Selecciona un vehicle</option>
          </select>

          <label for="data_cita">Data de la cita</label>
          <input type="date" id="data_cita" required />

          <label for="servei_sollicitat">Servei sol·licitat</label>
          <input
            type="text"
            id="servei_sollicitat"
            placeholder="Ex: Canvi d'oli"
            required
          />

          <button type="submit">Enviar cita</button>
        </form>

        <p id="missatge"></p>
      </section>

      <section class="card">
        <h2>Cites registrades</h2>
        <button id="btnCarregarCites" type="button">Actualitzar cites</button>
        <div id="llistatCites" class="llistat"></div>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
